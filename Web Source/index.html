<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090b">
    <title>Udara Chat | Context Fixed</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#FF4500', 500: '#FF4500', 600: '#E63E00', 400: '#FF5722' },
                        dark: { bg: '#09090b', surface: '#121214', border: 'rgba(255, 255, 255, 0.06)' },
                        zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        slideUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root { --glass-border: rgba(255, 255, 255, 0.08); }
        
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #ededed; overflow: hidden; font-feature-settings: "cv02", "cv03", "cv04", "cv11"; }
        
        /* Premium Scrollbars */
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Glassmorphism 2.0 */
        .glass-panel {
            background: rgba(18, 18, 20, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        .glass-input {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* Ambient Background */
        .ambient-mesh {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 69, 0, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(67, 56, 202, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 69, 0, 0.02) 0px, transparent 50%);
        }

        .noise-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Markdown Typography & Spacing */
        .markdown-content { font-size: 0.95rem; leading-trim: both; text-edge: cap; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.7; color: #d4d4d8; font-weight: 400; }
        .markdown-content pre { background: #0c0c0e !important; border-radius: 12px; padding: 1.25rem; margin: 1.5rem 0; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; box-shadow: inset 0 2px 8px rgba(0,0,0,0.2); position: relative; }
        .markdown-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }
        .markdown-content :not(pre) > code { background: rgba(255, 69, 0, 0.1); padding: 0.2em 0.4em; border-radius: 6px; color: #ff8a65; border: 1px solid rgba(255, 69, 0, 0.15); }
        .markdown-content ul, .markdown-content ol { padding-left: 1.5rem; margin-bottom: 1.25rem; color: #d4d4d8; }
        .markdown-content li { margin-bottom: 0.5rem; }
        .markdown-content strong { color: #f4f4f5; font-weight: 600; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { color: #f4f4f5; font-weight: 600; margin-top: 2rem; margin-bottom: 1rem; letter-spacing: -0.025em; }
        
        /* Premium Interactions */
        .spring-btn { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .spring-btn:active { transform: scale(0.96); }
        .sidebar-transition { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .command-center { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); width: 92%; max-width: 840px; z-index: 50; }
        
        .ai-bubble-gradient {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message-actions { opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; transform: translateY(4px); }
        .group:hover .message-actions, .group.active .message-actions { opacity: 1; transform: translateY(0); }
        
        /* Modern Switch */
        .toggle-checkbox:checked { right: 0; border-color: #FF4500; }
        .toggle-checkbox:checked + .toggle-label { background-color: #FF4500; box-shadow: 0 0 12px rgba(255, 69, 0, 0.4); }
        select option { background-color: #18181b; color: white; padding: 12px; }

        .code-copy-btn {
            position: absolute; top: 0.75rem; right: 0.75rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #a1a1aa; padding: 0.25rem 0.6rem; border-radius: 6px;
            font-size: 0.7rem; font-weight: 500; cursor: pointer; opacity: 0; transition: all 0.2s; backdrop-filter: blur(4px);
        }
        pre:hover .code-copy-btn { opacity: 1; }
        .code-copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col md:flex-row relative bg-dark-bg text-gray-200 selection:bg-brand-500/30 selection:text-brand-100">

    <div class="ambient-mesh"></div>
    <div class="noise-bg"></div>

    <!-- Mobile Header -->
    <header class="md:hidden h-14 glass-panel flex items-center justify-between px-5 z-40 shrink-0 border-b-0 relative">
        <button onclick="window.toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white spring-btn">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="flex items-center gap-2.5">
            <div class="w-6 h-6 rounded-md bg-gradient-to-br from-brand-500 to-orange-500 flex items-center justify-center text-white text-[10px] font-bold shadow-[0_0_12px_rgba(255,69,0,0.3)]">U</div>
            <span class="font-semibold text-white text-sm tracking-tight">Udara</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="mobileConnectionStatus" class="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)] transition-colors duration-500"></span>
            <button onclick="window.startNewChat()" class="p-2 -mr-2 text-gray-400 hover:text-white spring-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
    </header>

    <!-- Sidebar / Drawer -->
    <div id="sidebarBackdrop" onclick="window.toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-400 md:hidden"></div>
    
    <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-[280px] md:w-[300px] glass-panel z-50 transform -translate-x-full md:translate-x-0 sidebar-transition flex flex-col h-[100dvh] md:h-full border-r border-white/5 bg-zinc-950/80">
        
        <!-- Sidebar Header -->
        <div class="p-6 shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-orange-500 flex items-center justify-center text-white text-sm font-bold shadow-[0_2px_15px_rgba(255,69,0,0.25)] border border-white/10">U</div>
                <div class="flex flex-col">
                    <h1 class="font-semibold text-zinc-100 text-sm tracking-tight leading-tight">Udara Chat</h1>
                    <span class="text-[9px] text-brand-400 font-mono tracking-wider font-medium uppercase mt-0.5">Context Fixed</span>
                </div>
            </div>
            <button onclick="window.toggleSidebar()" class="md:hidden text-zinc-500 hover:text-white p-1 spring-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-hidden relative flex flex-col px-4">
            <button onclick="window.startNewChat()" class="spring-btn w-full py-2.5 px-4 bg-zinc-800/50 hover:bg-zinc-800 border border-white/5 hover:border-white/10 text-zinc-200 rounded-xl text-sm font-medium transition-all flex items-center justify-between group shadow-sm">
                <span class="flex items-center gap-2.5">
                    <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </span>
                <span class="text-[10px] text-zinc-500 font-mono border border-white/5 px-1.5 py-0.5 rounded bg-black/20 hidden md:block">⌘K</span>
            </button>
            
            <div class="mt-6 mb-2 pl-1">
                <div class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest">Recent</div>
            </div>
            <div id="chatsList" class="flex-1 overflow-y-auto custom-scroll space-y-0.5 -mx-2 px-2 pb-4">
                <!-- Chats injected here -->
            </div>
        </div>

        <!-- Sidebar Footer -->
        <div class="p-4 shrink-0 border-t border-white/5 bg-zinc-950/50">
            
            <!-- Web Search Toggle -->
            <div class="flex items-center justify-between mb-3 px-2 py-2 rounded-xl hover:bg-white/[0.02] transition-colors">
                <span class="text-xs text-zinc-300 font-medium flex items-center gap-2.5">
                    <div class="w-5 h-5 rounded flex items-center justify-center bg-brand-500/10 text-brand-500 border border-brand-500/20">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    </div>
                    Web Search
                </span>
                <div class="relative inline-block w-8 mr-1 align-middle select-none">
                    <input type="checkbox" name="toggle" id="webSearchToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-zinc-300 border-4 appearance-none cursor-pointer border-zinc-700 transition-all duration-200 ease-in-out top-[2px]"/>
                    <label for="webSearchToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-zinc-800 cursor-pointer border border-zinc-700 transition-colors"></label>
                </div>
            </div>

            <!-- Model / Keys Box -->
            <div class="bg-zinc-900/60 border border-white/5 rounded-xl p-1 mb-2">
                <button onclick="window.openKeysModal()" class="spring-btn w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-white/5 text-xs text-zinc-300 transition-colors group">
                    <span class="flex items-center gap-2 font-medium">
                        <svg class="w-3.5 h-3.5 text-zinc-400 group-hover:text-zinc-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        API Keys
                    </span>
                    <svg class="w-3 h-3 text-zinc-600 group-hover:text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <div class="relative mt-1">
                    <select id="activeModelSelect" class="w-full bg-transparent border-0 text-[11px] rounded-lg py-2 pl-3 pr-8 text-zinc-400 focus:ring-0 outline-none appearance-none cursor-pointer font-mono tracking-tight hover:text-zinc-200 transition-colors">
                        <option value="" disabled selected>Select key...</option>
                    </select>
                    <div class="absolute right-2.5 top-2 pointer-events-none text-zinc-600">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path></svg>
                    </div>
                </div>
            </div>
            
            <!-- External Links -->
            <div class="flex gap-2">
                <a href="mailto:chukwudikenkpuruomachukwu@gmail.com" class="spring-btn flex-1 flex items-center justify-center gap-1.5 py-2 px-2 bg-white/[0.02] hover:bg-white/[0.06] border border-white/5 rounded-lg text-[10px] uppercase font-semibold tracking-wider text-zinc-400 hover:text-zinc-100 transition-all">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Contact
                </a>
                <a href="https://udara-chat.netlify.app/legacy.html" target="_blank" class="spring-btn flex-1 flex items-center justify-center gap-1.5 py-2 px-2 bg-white/[0.02] hover:bg-white/[0.06] border border-white/5 rounded-lg text-[10px] uppercase font-semibold tracking-wider text-zinc-400 hover:text-zinc-100 transition-all">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Legacy
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full relative z-10 min-w-0">
        
        <!-- Desktop Top Bar -->
        <div class="hidden md:flex h-14 shrink-0 items-center justify-between px-8 border-b border-white/5 bg-transparent backdrop-blur-sm z-20">
            <div class="flex items-center gap-4">
                <h2 id="currentChatTitle" class="text-sm font-medium text-zinc-200 tracking-wide truncate max-w-md">New Conversation</h2>
                <div class="h-4 w-px bg-white/10"></div>
                <div class="flex items-center gap-2">
                    <span id="connectionStatus" class="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] transition-all duration-500"></span>
                    <span id="connectionText" class="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold">Disconnected</span>
                </div>
            </div>
            
            <div class="flex items-center gap-1.5">
                <button onclick="window.exportCurrentChat()" class="spring-btn p-1.5 text-zinc-400 hover:text-brand-400 hover:bg-white/5 rounded-lg transition-colors" title="Export Chat">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
                <button onclick="window.clearCurrentChatMessages()" class="spring-btn p-1.5 text-zinc-400 hover:text-red-400 hover:bg-white/5 rounded-lg transition-colors" title="Clear Chat">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chatContainer" class="flex-1 overflow-y-auto custom-scroll px-4 md:px-12 pt-8 scroll-smooth flex flex-col gap-6">
            <!-- Content Injected via JS -->
        </div>

        <!-- Scroll Anchor to prevent overlap -->
        <div id="scroll-anchor" class="h-44 md:h-52 w-full shrink-0"></div>

        <!-- Command Center (Input Area) -->
        <div class="command-center">
            <!-- Mode Selector -->
            <div class="flex justify-center mb-4">
                 <div class="flex gap-1.5 overflow-x-auto no-scrollbar px-2 py-1.5 bg-zinc-900/80 backdrop-blur-xl rounded-full border border-white/5 shadow-xl justify-start w-auto max-w-full" id="modeSelector">
                    <!-- Buttons generated in JS -->
                </div>
            </div>

            <!-- Main Input Box -->
            <div class="glass-input rounded-3xl p-1.5 transition-all focus-within:ring-1 focus-within:ring-white/20 focus-within:bg-zinc-900/90 relative">
                
                <!-- Processing Indicator -->
                <div id="processingIndicator" class="absolute -top-12 left-1/2 transform -translate-x-1/2 hidden z-10">
                    <div class="bg-zinc-800/90 backdrop-blur-md text-brand-400 text-[11px] font-medium px-4 py-1.5 rounded-full flex items-center gap-2 border border-white/10 shadow-lg">
                        <svg class="animate-spin h-3 w-3 text-brand-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="processText" class="tracking-wide">Thinking...</span>
                    </div>
                </div>

                <div class="relative flex items-end gap-2 px-3 pb-1 pt-1">
                    <textarea id="userInput" rows="1" class="w-full bg-transparent border-0 text-zinc-100 placeholder-zinc-500 focus:ring-0 resize-none max-h-48 py-2.5 text-[15px] leading-relaxed" placeholder="Ask anything..."></textarea>
                    <button id="sendBtn" onclick="window.handleSend()" class="spring-btn p-2.5 mb-1 bg-white text-black rounded-xl shadow-md hover:bg-zinc-200 transition-all disabled:opacity-30 disabled:cursor-not-allowed group">
                        <svg class="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
            <div class="text-center mt-3">
                 <p class="text-[10px] text-zinc-500 font-medium tracking-wide">Udara AI can make mistakes. Verify important info.</p>
            </div>
        </div>
    </main>

    <!-- Keys Modal -->
    <div id="keysModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0" id="keysModalBackdrop" onclick="window.closeKeysModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 md:p-0">
            <div class="bg-zinc-950 w-full max-w-xl rounded-2xl shadow-2xl transform scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[85vh] border border-white/10" id="keysModalContent">
                
                <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-zinc-900/30 rounded-t-2xl">
                    <div>
                        <h3 class="text-base font-semibold text-zinc-100 tracking-tight">API Configuration</h3>
                        <p class="text-xs text-zinc-500 mt-0.5">Keys are stored securely in your local browser.</p>
                    </div>
                    <button onclick="window.closeKeysModal()" class="text-zinc-500 hover:text-white bg-white/5 hover:bg-white/10 p-1.5 rounded-lg transition-colors spring-btn"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll p-6 bg-zinc-950">
                    <h4 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">Saved Keys</h4>
                    <div id="keysModalList" class="space-y-2"></div>
                </div>

                <div class="p-6 bg-zinc-900/50 border-t border-white/5 rounded-b-2xl">
                    <h4 class="text-[10px] font-bold text-brand-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Add New Key
                    </h4>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Provider / Model</label>
                                <div class="relative">
                                    <select id="newKeyModel" class="w-full bg-zinc-950 border border-white/10 rounded-xl px-3 py-2.5 text-zinc-200 focus:border-brand-500 outline-none transition-all text-xs appearance-none cursor-pointer hover:border-white/20">
                                        <optgroup label="Google Gemini (3.1 & 3.0 Series)">
                                            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                                            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite</option>
                                            <option value="gemini-3.1-flash-live-preview">Gemini 3.1 Flash Live</option>
                                            <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash Image</option>
                                            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                                        </optgroup>
                                        <optgroup label="Google Gemini (Stable)">
                                            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                        </optgroup>
                                        <optgroup label="OpenAI - GPT-5 Series">
                                            <option value="gpt-5.4">GPT-5.4 Flagship</option>
                                            <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
                                        </optgroup>
                                        <optgroup label="OpenAI - Reasoning">
                                            <option value="o1">o1</option>
                                            <option value="o3-mini">o3-mini</option>
                                        </optgroup>
                                        <optgroup label="xAI (Grok)">
                                            <option value="grok-4.20">Grok 4.20</option>
                                            <option value="grok-4">Grok 4</option>
                                        </optgroup>
                                        <optgroup label="DeepSeek">
                                            <option value="deepseek-chat">DeepSeek V3.2/V4 (Chat)</option>
                                            <option value="deepseek-reasoner">DeepSeek R2 (Reasoner)</option>
                                        </optgroup>
                                    </select>
                                    <div class="absolute right-3 top-2.5 pointer-events-none text-zinc-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path></svg></div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Alias (Label)</label>
                                <input type="text" id="newKeyLabel" placeholder="e.g. Production Key" class="w-full bg-zinc-950 border border-white/10 rounded-xl px-3 py-2.5 text-zinc-200 focus:border-brand-500 outline-none transition-all placeholder-zinc-600 text-xs">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">Secret Key</label>
                            <div class="flex gap-2">
                                <input type="password" id="newKeyValue" placeholder="sk-..." class="flex-1 bg-zinc-950 border border-white/10 rounded-xl px-3 py-2 text-zinc-200 focus:border-brand-500 outline-none transition-all placeholder-zinc-600 text-xs font-mono">
                                <button onclick="window.saveNewKey()" class="spring-btn px-5 py-2 bg-white text-black hover:bg-zinc-200 rounded-xl text-xs font-semibold transition-all shadow-sm">Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // --- 1. STATE & CONSTANTS ---
        let apiKeys = [];
        try { apiKeys = JSON.parse(localStorage.getItem('udara_api_keys') || '[]'); } catch(e) { apiKeys = []; }
        let activeKeyId = localStorage.getItem('udara_active_key_id') || null;
        let conversations = [];
        try { conversations = JSON.parse(localStorage.getItem('udara_conversations') || '[]'); } catch(e) { conversations = []; }
        let currentChatId = localStorage.getItem('udara_current_chat_id') || null;
        let isProcessing = false;
        let currentMode = 'standard';
        let webSearchEnabled = false;

        const COGNITIVE_ARCHITECTURE = `
        CRITICAL DIRECTIVE: You are an INTERNAL ROUTER and PROMPT ENGINEER. You DO NOT answer the user's actual question.
        Your ONLY job is to output a single JSON object. NEVER output markdown, NEVER converse with the user.
        
        Evaluate the LATEST user message in the context of the provided conversation history.
        
        DECISION LOGIC:
        1. IF the latest user input is a generic greeting: 
           Output JSON: {"mode": "direct", "content": "Original text"}
        
        2. IF the latest user input is vague, lacks details, AND cannot be understood using the conversation history (e.g. they say "Samsung" with no prior context):
           Output JSON: {"mode": "clarify", "content": { "question": "What specifically would you like to know or do?", "suggestions": ["Option 1", "Option 2", "Option 3"] } }

        3. IF the latest user input is a detailed request, OR is a short follow-up that makes perfect sense given the conversation history:
           Output JSON: { "reasoning": "Strategy based on history and new prompt", "mode": "enhanced", "content": { "Role": "Expert Persona", "Context": "Combine history and latest prompt into full context", "Task": "Goal", "Constraints": "Rules", "OutputFormat": "Format" } }
        `;

        const MODES = {
            standard: { label: 'Standard', icon: 'M13 10V3L4 14h7v7l9-11h-7z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Standard. Role: Expert Generalist.` },
            concise: { label: 'Concise', icon: 'M4 6h16M4 12h16m-7 6h7', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Concise. Role: Precision Engine. Methodology: Bulleted.` },
            coding: { label: 'Coding', icon: 'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Coding. Role: Senior Architect.` },
            academic: { label: 'Academic', icon: 'M12 14l9-5-9-5-9 5 9 5z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Academic. Role: Distinguished Professor. Methodology: Dialectical Analysis.` },
            pupil: { label: 'Pupil', icon: 'M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Pupil. Role: World-Class Educator. Methodology: Analogy -> Explanation -> Definition.` },
            creative: { label: 'Creative', icon: 'M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Creative. Role: Novelist. Methodology: Show, Don't Tell.` },
            chitchat: { label: 'ChitChat', icon: 'M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: ChitChat. Role: Friendly Companion. Tone: Casual, warm.` },
            fun: { label: 'Fun', icon: 'M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Fun. Role: Entertainer. Tone: Witty.` },
            gossip: { label: 'Gossip', icon: 'M13 10V3L4 14h7v7l9-11h-7z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Gossip. Role: Dramatic Friend. Tone: "Spill the tea", slang.` },
            trainer: { label: 'Trainer', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Trainer. Role: Coach. Tone: Motivating, firm.` },
            human: { label: 'Human', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', prompt: `${COGNITIVE_ARCHITECTURE}\nMode: Human. Role: GENERATE PERSONA. Add natural bias.` }
        };

        // --- 2. UI RENDERING FUNCTIONS ---
        function renderWelcomeScreen() {
            const container = document.getElementById('chatContainer');
            if (container) {
                container.innerHTML = `
                <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center opacity-0 animate-slide-up pb-20">
                    <div class="w-20 h-20 rounded-3xl bg-zinc-900 border border-white/5 flex items-center justify-center shadow-2xl mb-6 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-tr from-brand-600/20 to-purple-600/20"></div>
                        <span class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-zinc-100 to-zinc-500 relative z-10">U</span>
                    </div>
                    <h2 class="text-3xl font-semibold text-zinc-100 mb-2 tracking-tight">Udara Chat</h2>
                    <p class="text-zinc-500 text-sm max-w-sm font-light leading-relaxed">
                        A premium reasoning interface.<br>Select a mode, enter your prompt, and let the engine optimize it.
                    </p>
                </div>`;
            }
        }

        function renderModeSelector() {
            const container = document.getElementById('modeSelector');
            if (container) {
                container.innerHTML = Object.entries(MODES).map(([key, config]) => `
                    <button onclick="window.setMode('${key}')" id="btn-${key}" class="spring-btn shrink-0 px-3.5 py-1.5 rounded-full text-[11px] font-medium border border-transparent text-zinc-400 hover:text-zinc-100 transition-all flex items-center gap-1.5 hover:bg-white/[0.04] ${key === currentMode ? 'active bg-white/10 text-white border-white/10 shadow-sm' : ''}">
                        <svg class="w-3.5 h-3.5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${config.icon}"></path></svg>
                        ${config.label}
                    </button>
                `).join('');
            }
        }

        function renderKeysList() {
            const c = document.getElementById('keysModalList');
            if (c) {
                if (apiKeys.length === 0) { c.innerHTML = '<div class="text-center text-xs text-zinc-600 py-6">No API keys configured.</div>'; return; }
                c.innerHTML = apiKeys.map(k => {
                    const act = k.id === activeKeyId;
                    return `
                    <div onclick="window.setActiveKey('${k.id}')" class="group p-3 rounded-xl border transition-all cursor-pointer ${act ? 'bg-white/5 border-white/20' : 'bg-transparent border-white/5 hover:border-white/10'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="text-xs font-semibold ${act ? 'text-zinc-100' : 'text-zinc-400'}">${k.label}</h4>
                                <span class="text-[10px] text-zinc-600 font-mono mt-0.5 block">${k.model}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                ${act ? '<div class="w-2 h-2 rounded-full bg-brand-500 shadow-[0_0_8px_rgba(255,69,0,0.8)]"></div>' : ''}
                                <button onclick="window.deleteKey('${k.id}', event)" class="text-zinc-600 hover:text-red-400 transition-colors p-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        function renderChatsList() {
            const c = document.getElementById('chatsList');
            if (c) {
                if (!conversations || conversations.length === 0) { c.innerHTML = '<div class="text-center text-xs text-zinc-600 py-6">No history</div>'; return; }
                c.innerHTML = conversations.map(ch => {
                    const act = ch.id === currentChatId;
                    const dt = new Date(ch.timestamp).toLocaleDateString([],{month:'short', day:'numeric'});
                    return `
                    <div onclick="window.loadChat('${ch.id}')" class="group relative px-3 py-2.5 rounded-lg cursor-pointer transition-all ${act ? 'bg-white/[0.06] text-white' : 'hover:bg-white/[0.03] text-zinc-400 hover:text-zinc-200'}">
                        <div class="flex justify-between items-center gap-2">
                            <span class="text-xs font-medium truncate flex-1">${ch.title}</span>
                            <span class="text-[9px] text-zinc-600 whitespace-nowrap opacity-100 group-hover:opacity-0 transition-opacity">${dt}</span>
                        </div>
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity flex items-center bg-zinc-900 rounded pl-2">
                            <button onclick="window.deleteChat('${ch.id}', event)" class="p-1 text-zinc-500 hover:text-red-400 transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        function renderMessageBubble(role, text, hiddenPrompt = null, index, sources = null, type = 'normal', suggestions = []) {
            const container = document.getElementById('chatContainer');
            if (!container) return;
            
            const id = 'msg-' + Date.now() + Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-slide-up group relative`; 
            div.id = id;

            let actionsHTML = '';
            if (role !== 'error' && index >= 0) {
                actionsHTML = `
                    <div class="message-actions flex flex-col gap-1 items-center justify-end mx-2 pb-1">
                        <button onclick="window.copyToClipboard(\`${text.replace(/`/g, '\\`').replace(/"/g, '&quot;')}\`)" class="p-1.5 text-zinc-500 hover:text-zinc-200 bg-zinc-800/80 rounded-md transition-colors" title="Copy"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                        ${role === 'user' ? `<button onclick="window.editMessage(${index})" class="p-1.5 text-zinc-500 hover:text-brand-400 bg-zinc-800/80 rounded-md transition-colors" title="Edit"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>` : ''}
                        <button onclick="window.deleteMessage(${index})" class="p-1.5 text-zinc-500 hover:text-red-400 bg-zinc-800/80 rounded-md transition-colors" title="Delete"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>`;
            }

            let detailsHTML = '';
            if (hiddenPrompt) {
                const jsonString = typeof hiddenPrompt === 'string' ? hiddenPrompt : JSON.stringify(hiddenPrompt, null, 2);
                const safeJson = jsonString.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                detailsHTML = `
                <div class="mb-3">
                    <button onclick="window.toggleDetails('${id}-details')" class="text-[10px] uppercase font-semibold text-brand-500 hover:text-brand-400 flex items-center gap-1.5 transition-colors w-fit tracking-wider">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        View Optimization
                    </button>
                    <div id="${id}-details" class="hidden mt-2">
                        <pre class="text-[10px] font-mono text-zinc-400 overflow-x-auto whitespace-pre-wrap bg-zinc-900/50 p-3 rounded-xl border border-white/5 shadow-inner leading-relaxed">${safeJson}</pre>
                    </div>
                </div>`;
            }

            let suggestionsHTML = '';
            if (type === 'clarify' && suggestions && suggestions.length > 0) {
                suggestionsHTML = `
                <div class="flex flex-wrap gap-2 mt-4 pt-3 border-t border-white/5">
                    ${suggestions.map(s => `<button onclick="window.handleSuggestion('${s.replace(/'/g, "\\'")}')" class="px-3.5 py-1.5 bg-zinc-800/50 hover:bg-zinc-700 border border-white/10 rounded-full text-[11px] font-medium text-zinc-300 hover:text-white transition-all text-left spring-btn">${s}</button>`).join('')}
                </div>`;
            }

            if (role === 'user') {
                div.innerHTML = `${actionsHTML}<div class="max-w-[85%] md:max-w-[70%] bg-zinc-800/80 text-zinc-100 rounded-3xl rounded-tr-sm px-5 py-3 border border-white/10 text-[15px] leading-relaxed shadow-sm">${text.replace(/\n/g, '<br>')}</div>`;
            } else if (role === 'ai') {
                const parsedText = text ? marked.parse(text) : '<span class="animate-pulse text-zinc-500">Thinking...</span>';
                
                let sourceHTML = '';
                if (sources && sources.length > 0) {
                    sourceHTML = `
                    <div class="mt-4 pt-3 border-t border-white/5">
                        <div class="text-[10px] uppercase font-semibold text-zinc-500 tracking-wider mb-2">Sources</div>
                        <div class="flex flex-wrap gap-1.5">
                            ${sources.map((s, idx) => `<a href="${s.uri}" target="_blank" class="text-[10px] bg-zinc-900 hover:bg-zinc-800 border border-white/5 px-2 py-1 rounded-md text-zinc-400 hover:text-zinc-200 transition-colors truncate max-w-[200px]" title="${s.title}">${s.title}</a>`).join('')}
                        </div>
                    </div>`;
                }

                div.innerHTML = `
                    <div class="flex gap-4 max-w-[100%] md:max-w-[85%]">
                        <div class="w-8 h-8 rounded-full bg-zinc-900 border border-white/10 flex-shrink-0 flex items-center justify-center mt-1 relative">
                            <div class="absolute inset-0 bg-brand-500/20 rounded-full blur-[4px]"></div>
                            <svg class="w-4 h-4 text-brand-500 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <div class="flex flex-col w-full min-w-0">
                            ${detailsHTML}
                            <div class="text-[15px] text-zinc-200 leading-relaxed markdown-content">
                                ${type === 'clarify' ? '<div class="text-[10px] font-semibold text-brand-400 uppercase mb-2 tracking-widest">Clarification Needed</div>' : ''}
                                ${parsedText}
                                ${suggestionsHTML}
                            </div>
                            ${sourceHTML}
                        </div>
                    </div>
                    ${actionsHTML}
                `;
            } else {
                div.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 text-red-300 rounded-xl px-5 py-3 max-w-[85%] text-sm flex gap-3 items-center shadow-sm"><svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>${text}</span></div>`;
            }
            
            container.appendChild(div);
            window.scrollToBottom();
            
            if (role === 'ai' && text) {
                setTimeout(() => {
                    hljs.highlightAll();
                    div.querySelectorAll('pre').forEach(pre => {
                        if (!pre.querySelector('.code-copy-btn')) {
                            const btn = document.createElement('button');
                            btn.className = 'code-copy-btn';
                            btn.innerText = 'Copy';
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                const code = pre.querySelector('code').innerText;
                                window.copyToClipboard(code);
                                btn.innerText = 'Copied!';
                                setTimeout(() => btn.innerText = 'Copy', 2000);
                            };
                            pre.appendChild(btn);
                        }
                    });
                }, 0);
            }
            return id;
        }

        // --- 4. INTERACTION FUNCTIONS ---
        window.setMode = function(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.className = "mode-btn shrink-0 px-3.5 py-1.5 rounded-full text-[11px] font-medium border border-transparent text-zinc-400 hover:text-zinc-100 transition-all flex items-center gap-1.5 hover:bg-white/[0.04] spring-btn");
            const activeBtn = document.getElementById(`btn-${mode}`);
            if(activeBtn) activeBtn.className = "mode-btn active shrink-0 px-3.5 py-1.5 rounded-full text-[11px] font-medium bg-white/10 text-white border border-white/10 transition-all flex items-center gap-1.5 shadow-sm spring-btn";
        };

        window.toggleDetails = function(id) { const el = document.getElementById(id); if (el) el.classList.toggle('hidden'); };
        
        window.toggleSidebar = function() {
            const s = document.getElementById('sidebar');
            const b = document.getElementById('sidebarBackdrop');
            if (s && b) {
                if (s.classList.contains('-translate-x-full')) {
                    s.classList.remove('-translate-x-full');
                    b.classList.remove('pointer-events-none','opacity-0');
                } else {
                    s.classList.add('-translate-x-full');
                    b.classList.add('pointer-events-none','opacity-0');
                }
            }
        };

        window.scrollToBottom = function() { const c = document.getElementById('chatContainer'); if (c) c.scrollTop = c.scrollHeight; };
        
        window.setProcessing = function(active, text) {
            const ind = document.getElementById('processingIndicator');
            const txt = document.getElementById('processText');
            const btn = document.getElementById('sendBtn');
            const inp = document.getElementById('userInput');
            isProcessing = active;
            if (active) {
                if (ind) ind.classList.remove('hidden');
                if (txt) txt.innerText = text || 'Thinking...';
                if (btn) { btn.disabled = true; }
                if (inp) inp.disabled = true;
            } else {
                if (ind) ind.classList.add('hidden');
                if (btn) { btn.disabled = false; }
                if (inp) { inp.disabled = false; inp.focus(); }
            }
        };

        window.updateActiveModelSelect = function() {
            const s = document.getElementById('activeModelSelect');
            if (!s) return;
            if (apiKeys.length === 0) { s.innerHTML = '<option disabled selected>No keys</option>'; return; }
            s.innerHTML = apiKeys.map(k => `<option value="${k.id}" ${k.id === activeKeyId ? 'selected' : ''}>${k.label} (${k.model})</option>`).join('');
            s.onchange = (e) => window.setActiveKey(e.target.value);
        };

        window.updateConnectionStatus = function(c) {
            const d = document.getElementById('connectionStatus');
            const t = document.getElementById('connectionText');
            const md = document.getElementById('mobileConnectionStatus');
            if (c && activeKeyId) {
                if(d){ d.className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"; t.innerText="Active"; t.className="text-[10px] text-emerald-500 uppercase tracking-widest font-semibold";}
                if(md) md.className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)] transition-colors duration-500";
            } else {
                if(d){ d.className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"; t.innerText="Disconnected"; t.className="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold";}
                if(md) md.className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] transition-colors duration-500";
            }
        };

        window.openKeysModal = function() {
            window.renderKeysList();
            const m = document.getElementById('keysModal');
            if (m) m.classList.remove('hidden');
            requestAnimationFrame(() => {
                document.getElementById('keysModalBackdrop').classList.remove('opacity-0');
                document.getElementById('keysModalContent').classList.remove('scale-95', 'opacity-0');
                document.getElementById('keysModalContent').classList.add('scale-100', 'opacity-100');
            });
        };
        
        window.closeKeysModal = function() {
            document.getElementById('keysModalBackdrop').classList.add('opacity-0');
            document.getElementById('keysModalContent').classList.remove('scale-100', 'opacity-100');
            document.getElementById('keysModalContent').classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('keysModal').classList.add('hidden'), 300);
        };

        window.saveNewKey = async function() {
            const label = document.getElementById('newKeyLabel').value.trim();
            const model = document.getElementById('newKeyModel').value;
            const key = document.getElementById('newKeyValue').value.trim();
            if (!label || !key) return alert('Fill all fields');
            
            let provider = 'openai';
            if (model.includes('gemini')) provider = 'gemini';
            else if (model.includes('grok')) provider = 'xai';
            else if (model.includes('deepseek')) provider = 'deepseek';
            
            const newKey = { id: Date.now().toString(), label, model, key, provider };
            apiKeys.push(newKey);
            localStorage.setItem('udara_api_keys', JSON.stringify(apiKeys));
            if (apiKeys.length === 1) window.setActiveKey(newKey.id);
            
            document.getElementById('newKeyLabel').value = '';
            document.getElementById('newKeyValue').value = '';
            
            window.renderKeysList();
            window.updateActiveModelSelect();
            window.closeKeysModal();
        };

        window.deleteKey = function(id, e) {
            e.stopPropagation();
            if (!confirm("Delete key?")) return;
            apiKeys = apiKeys.filter(k => k.id !== id);
            localStorage.setItem('udara_api_keys', JSON.stringify(apiKeys));
            if (activeKeyId === id) window.setActiveKey(apiKeys.length > 0 ? apiKeys[0].id : null);
            window.renderKeysList();
            window.updateActiveModelSelect();
        };

        window.setActiveKey = function(id) {
            activeKeyId = id;
            localStorage.setItem('udara_active_key_id', id || '');
            window.renderKeysList();
            window.updateConnectionStatus(!!id);
            window.updateActiveModelSelect();
        };

        window.startNewChat = function() {
            currentChatId = 'chat_' + Date.now();
            localStorage.setItem('udara_current_chat_id', currentChatId);
            window.renderWelcomeScreen();
            const t = document.getElementById('currentChatTitle');
            if (t) t.innerText = 'New Conversation';
            window.renderChatsList();
            if (window.innerWidth < 768) window.toggleSidebar();
        };

        window.loadChat = function(id) {
            const chat = conversations.find(c => c.id === id);
            if (!chat) { window.startNewChat(); return; }
            
            currentChatId = id;
            localStorage.setItem('udara_current_chat_id', id);
            document.getElementById('currentChatTitle').innerText = chat.title;
            
            const container = document.getElementById('chatContainer');
            if (container) {
                container.innerHTML = '';
                if (chat.messages && chat.messages.length > 0) {
                    chat.messages.forEach((m, idx) => {
                        const type = m.type || (m.role === 'ai' && m.hiddenPrompt ? 'normal' : m.role);
                        window.renderMessageBubble(m.role, m.text, m.hiddenPrompt, idx, m.sources, type, m.suggestions);
                    });
                    setTimeout(window.scrollToBottom, 100);
                } else {
                    window.renderWelcomeScreen();
                }
            }
            window.renderChatsList();
            if (window.innerWidth < 768) window.toggleSidebar();
        };

        window.saveConversation = function(id, msg, title) {
            let chat = conversations.find(c => c.id === id);
            if (!chat) {
                chat = { id: id, title: title || 'New Conversation', messages: [], timestamp: Date.now() };
                conversations.unshift(chat);
            } else {
                chat.timestamp = Date.now();
                if (title) chat.title = title;
                conversations = conversations.filter(c => c.id !== id);
                conversations.unshift(chat);
            }
            if (msg) chat.messages.push(msg);
            localStorage.setItem('udara_conversations', JSON.stringify(conversations));
            window.renderChatsList();
        };

        window.deleteChat = function(id, e) {
            e.stopPropagation();
            if (!confirm("Delete?")) return;
            conversations = conversations.filter(c => c.id !== id);
            localStorage.setItem('udara_conversations', JSON.stringify(conversations));
            if (currentChatId === id) window.startNewChat();
            else window.renderChatsList();
        };

        window.clearCurrentChatMessages = function() {
            if (!confirm("Clear chat?")) return;
            const chat = conversations.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages = [];
                localStorage.setItem('udara_conversations', JSON.stringify(conversations));
                window.startNewChat();
            }
        };

        window.exportCurrentChat = function() {
            const chat = conversations.find(c => c.id === currentChatId);
            if (!chat || !chat.messages.length) { alert("Nothing to export."); return; }
            let md = `# ${chat.title}\n\n`;
            chat.messages.forEach(m => md += `### ${m.role}\n${m.text}\n\n`);
            const blob = new Blob([md], {type:'text/markdown'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${chat.id}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.copyToClipboard = function(text) {
            if (!navigator.clipboard) {
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
            } else {
                navigator.clipboard.writeText(text);
            }
        };

        window.deleteMessage = function(index) {
            if (!confirm("Delete msg?")) return;
            let chat = conversations.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages.splice(index, 1);
                localStorage.setItem('udara_conversations', JSON.stringify(conversations));
                window.loadChat(currentChatId);
            }
        };

        window.editMessage = function(index) {
            let chat = conversations.find(c => c.id === currentChatId);
            if (chat && chat.messages[index]) {
                const msgText = chat.messages[index].text;
                chat.messages = chat.messages.slice(0, index);
                localStorage.setItem('udara_conversations', JSON.stringify(conversations));
                const inp = document.getElementById('userInput');
                inp.value = msgText;
                window.loadChat(currentChatId);
                inp.focus();
            }
        };

        window.handleSuggestion = function(text) {
            const inp = document.getElementById('userInput');
            inp.value = text;
            window.handleSend();
        };

        // --- 5. API INTEGRATION ---
        async function callOpenAICompatible(baseUrl, key, payload) {
            const r = await fetch(baseUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` }, 
                body: JSON.stringify(payload) 
            });
            if (!r.ok) { const err = await r.json(); throw new Error(err.error?.message || "API Error"); }
            const d = await r.json(); 
            return d.choices[0].message.content; 
        }

        async function callAI(keyConfig, msgs, forceJson=false, useSearch=false) { 
            const payload = { model: keyConfig.model, messages: msgs }; 
            if(forceJson) payload.response_format = { type: "json_object" }; 
            
            if (keyConfig.provider === 'openai') {
                return { text: await callOpenAICompatible('https://api.openai.com/v1/chat/completions', keyConfig.key, payload), sources: null };
            } else if (keyConfig.provider === 'xai') {
                return { text: await callOpenAICompatible('https://api.x.ai/v1/chat/completions', keyConfig.key, payload), sources: null };
            } else if (keyConfig.provider === 'deepseek') {
                return { text: await callOpenAICompatible('https://api.deepseek.com/chat/completions', keyConfig.key, payload), sources: null };
            } else {
                return await callGemini(keyConfig.key, keyConfig.model, msgs, forceJson, useSearch); 
            }
        }
        
        async function callGemini(key, model, msgs, forceJson, useSearch) { 
            let systemPrompt = "";
            if (msgs.length > 0 && msgs[0].role === 'system') { 
                systemPrompt = msgs[0].content; 
                msgs = msgs.slice(1); 
            }
            
            const contents = msgs.map(m => ({ 
                role: m.role === 'user' ? 'user' : 'model', 
                parts: [{ text: m.content || " " }] 
            }));
            
            if (systemPrompt && contents.length > 0) { 
                contents[0].parts[0].text = systemPrompt + "\n\n" + contents[0].parts[0].text; 
            } else if (systemPrompt && contents.length === 0) { 
                contents.push({ role: 'user', parts: [{ text: systemPrompt }] }); 
            }
            
            const config = forceJson ? { responseMimeType: "application/json" } : {};
            const tools = useSearch ? [{ google_search: {} }] : [];
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`; 
            
            const r = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ contents, generationConfig: config, tools }) 
            }); 
            
            const d = await r.json(); 
            if (d.error) throw new Error(d.error.message); 
            
            let sources = null;
            const groundingMetadata = d.candidates[0].groundingMetadata;
            if (groundingMetadata && groundingMetadata.groundingChunks) { 
                sources = groundingMetadata.groundingChunks
                    .filter(c => c.web && c.web.uri && c.web.title)
                    .map(c => ({ title: c.web.title, uri: c.web.uri })); 
            }
            
            return { text: d.candidates[0].content.parts[0].text, sources: sources }; 
        }

        window.handleSend = async function() {
            const inputEl = document.getElementById('userInput'); 
            const text = inputEl.value.trim(); 
            const activeKey = apiKeys.find(k => k.id === activeKeyId);
            
            if (!text) return; 
            if (!activeKey) { alert("Please select an API Key."); window.openKeysModal(); return; }
            
            inputEl.value = ''; 
            inputEl.style.height = 'auto'; 
            
            const welcome = document.getElementById('welcomeScreen'); 
            if (welcome) welcome.remove();

            let chat = conversations.find(c => c.id === currentChatId);
            let titleToSave = null;
            if (!chat || !chat.messages || chat.messages.length === 0) {
                titleToSave = text.length > 25 ? text.substring(0, 25) + '...' : text;
                const titleEl = document.getElementById('currentChatTitle');
                if (titleEl) titleEl.innerText = titleToSave;
            }
            
            const userMsgObj = { role: 'user', text: text };
            window.saveConversation(currentChatId, userMsgObj, titleToSave);
            chat = conversations.find(c => c.id === currentChatId);
            window.renderMessageBubble('user', text, null, chat.messages.length - 1);

            window.setProcessing(true, `Optimizing (${currentMode})...`);

            try {
                // FIXED CONTEXT BUG: Get all messages EXCEPT the current one (to pass full history)
                const historyBeforeCurrent = chat.messages.slice(0, -1);
                
                const enhanceContext = historyBeforeCurrent.map(m => ({ role: m.role === 'user' ? 'user' : 'model', content: m.text }));
                enhanceContext.unshift({ role: 'system', content: MODES[currentMode].prompt });
                enhanceContext.push({ role: 'user', content: text });

                const rawEnhancerResponse = await callAI(activeKey, enhanceContext, true, false);
                
                let enhancedData;
                try {
                    const cleanJson = rawEnhancerResponse.text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const firstBrace = cleanJson.indexOf('{');
                    const lastBrace = cleanJson.lastIndexOf('}');
                    if (firstBrace !== -1 && lastBrace !== -1) {
                        enhancedData = JSON.parse(cleanJson.substring(firstBrace, lastBrace + 1));
                    } else { throw new Error("No JSON"); }
                } catch (e) {
                    enhancedData = { mode: "direct", content: text, reasoning: "Fallback." };
                }

                if (enhancedData.mode === 'clarify') {
                    let qText = enhancedData.content;
                    let suggestions = [];
                    if (typeof enhancedData.content === 'object') {
                        qText = enhancedData.content.question;
                        suggestions = enhancedData.content.suggestions || [];
                    }
                    const aiMsgObj = { role: 'ai', text: qText, type: 'clarify', suggestions: suggestions };
                    window.saveConversation(currentChatId, aiMsgObj);
                    window.renderMessageBubble('ai', qText, null, chat.messages.length, null, 'clarify', suggestions);
                    window.setProcessing(false);
                    return;
                }

                let finalPromptToSend, hiddenDetails;
                hiddenDetails = JSON.stringify(enhancedData, null, 2);
                const shouldSearch = webSearchEnabled && enhancedData.mode !== 'direct';

                if (enhancedData.mode === "direct") { 
                    finalPromptToSend = text; 
                } else { 
                    finalPromptToSend = typeof enhancedData.content === 'string' ? enhancedData.content : JSON.stringify(enhancedData.content, null, 2); 
                }

                window.setProcessing(true, shouldSearch ? 'Browsing...' : 'Generating...');
                
                const aiBubbleId = window.renderMessageBubble('ai', '', hiddenDetails, chat.messages.length); 
                const aiContentEl = document.getElementById(aiBubbleId).querySelector('.markdown-content');

                const finalContext = historyBeforeCurrent.map(m => ({ role: m.role === 'user' ? 'user' : 'model', content: m.text }));
                
                finalContext.unshift({ role: 'system', content: "You are a helpful AI assistant. Return Markdown." });
                finalContext.push({ role: 'user', content: finalPromptToSend });

                const finalResponse = await callAI(activeKey, finalContext, false, shouldSearch);
                const finalAnswer = finalResponse.text;
                const sources = finalResponse.sources;

                const aiMsgObj = { role: 'ai', text: finalAnswer, hiddenPrompt: hiddenDetails, sources: sources };
                window.saveConversation(currentChatId, aiMsgObj);

                let i = 0; 
                aiContentEl.innerHTML = '';
                
                const typeInterval = setInterval(() => {
                    aiContentEl.innerHTML = marked.parse(finalAnswer.substring(0, i)); 
                    
                    window.scrollToBottom();
                    
                    i += Math.floor(Math.random() * 20) + 5;
                    
                    if (i > finalAnswer.length) { 
                        clearInterval(typeInterval); 
                        aiContentEl.innerHTML = marked.parse(finalAnswer); 
                        if (sources) {
                             const sourceHTML = `<div class="mt-4 pt-3 border-t border-white/5"><div class="text-[10px] uppercase font-bold text-zinc-500 mb-2 tracking-wider">Sources</div><div class="flex flex-wrap gap-1.5">${sources.map((s, idx) => `<a href="${s.uri}" target="_blank" class="text-[10px] bg-zinc-900 hover:bg-zinc-800 border border-white/5 px-2 py-1 rounded-md text-zinc-400 hover:text-zinc-200 transition-colors truncate max-w-[200px]" title="${s.title}">${s.title}</a>`).join('')}</div></div>`;
                             aiContentEl.innerHTML += sourceHTML;
                        }
                        hljs.highlightAll(); 
                        
                        // Re-attach code copy buttons
                        document.getElementById(aiBubbleId).querySelectorAll('pre').forEach(pre => {
                            if (!pre.querySelector('.code-copy-btn')) {
                                const btn = document.createElement('button');
                                btn.className = 'code-copy-btn';
                                btn.innerText = 'Copy';
                                btn.onclick = (e) => {
                                    e.stopPropagation();
                                    const code = pre.querySelector('code').innerText;
                                    window.copyToClipboard(code);
                                    btn.innerText = 'Copied!';
                                    setTimeout(() => btn.innerText = 'Copy', 2000);
                                };
                                pre.appendChild(btn);
                            }
                        });

                        window.scrollToBottom(); 
                    }
                }, 10);

            } catch (err) { 
                window.renderMessageBubble('error', `Error: ${err.message}`, null, -1); 
            } finally { 
                window.setProcessing(false); 
            }
        };

        // --- 6. INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            window.renderModeSelector(); 
            window.renderKeysList(); 
            window.renderChatsList(); 
            window.updateActiveModelSelect();
            
            const ta = document.getElementById('userInput');
            if (ta) {
                ta.addEventListener('input', function() { 
                    this.style.height = 'auto'; 
                    this.style.height = (this.scrollHeight) + 'px'; 
                });
                ta.addEventListener('keydown', (e) => { 
                    if (e.key === 'Enter' && !e.shiftKey) { 
                        e.preventDefault(); 
                        window.handleSend(); 
                    } 
                });
            }
            
            const toggle = document.getElementById('webSearchToggle');
            if (toggle) {
                toggle.addEventListener('change', (e) => { 
                    webSearchEnabled = e.target.checked; 
                });
            }

            if (apiKeys.length > 0 && activeKeyId) {
                window.updateConnectionStatus(true);
            }
            
            if (currentChatId) {
                window.loadChat(currentChatId); 
            } else {
                window.startNewChat();
            }
        });
    </script>
